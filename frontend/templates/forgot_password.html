<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Smart Silo System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background-image: url('https://images.unsplash.com/photo-1574323347407-f5e1ad6d020b?w=1600');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 1;
            text-align: center;
        }
        
        h2 {
            color: white;
            margin-bottom: 20px;
        }
        
        .message {
            background: rgba(16, 185, 129, 0.9);
            color: white;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .error {
            background: rgba(239, 68, 68, 0.9);
            color: white;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
        }
        
        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: rgba(37, 99, 235, 0.85);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            background: rgba(37, 99, 235, 1);
            transform: scale(1.02);
        }
        
        .back-link {
            display: block;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
        }
        
        .back-link:hover {
            color: white;
        }
        
        .info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            font-size: 13px;
            color: rgba(255,255,255,0.8);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Forgot Password</h2>
        
        {% if message %}
        <div class="message">{{ message }}</div>
        {% endif %}
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <input type="email" name="email" placeholder="Email Address" required>
            <button type="submit">Reset Password</button>
        </form>
        
        <div class="info">
            <strong>📌 Note:</strong> Enter the email address associated with your account. A password reset link will be sent if the email exists.
            <br><br>
            <strong>Admin Contact:</strong> admin@smartsilo.com
        </div>
        
        <a href="/login" class="back-link">← Back to Login</a>
    </div>
</body>
</html>
