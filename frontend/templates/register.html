<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Silo System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-image: url('https://images.unsplash.com/photo-1574323347407-f5e1ad6d020b?w=1600');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }
        .register-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 36px 28px;
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255,255,255,0.2);
            margin: auto;
        }
        h1 { text-align: center; color: white; margin-bottom: 10px; font-size: 28px; }
        .subtitle { text-align: center; color: rgba(255,255,255,0.8); margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 15px; }
        input, select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            font-size: 14px;
            color: white;
            outline: none;
        }
        input::placeholder { color: rgba(255,255,255,0.6); }
        input:focus, select:focus {
            background: rgba(255,255,255,0.25);
            border-color: rgba(255,255,255,0.5);
        }
        select option { background: #2c3e50; color: white; }
        button {
            width: 100%;
            padding: 12px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #059669; transform: scale(1.02); }
        .error-list {
            background: rgba(231,76,60,0.9);
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .error-list ul { margin-left: 20px; }
        .links { margin-top: 20px; text-align: center; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.2); }
        .links a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 13px; }
        .links a:hover { color: white; }
        .icon { text-align: center; font-size: 50px; margin-bottom: 15px; }
        .requirements { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 5px; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="icon">📝</div>
        <h1>Create Account</h1>
        <div class="subtitle">Register to access Smart Silo System</div>
        
        {% if errors %}
        <div class="error-list">
            <ul>
                {% for error in errors %}
                <li>{{ error }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}
        
        <form method="POST">
            <div class="form-group">
                <input type="text" name="full_name" placeholder="Full Name" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <input type="tel" name="phone" placeholder="Phone Number (optional)">
            </div>
            <div class="form-group">
                <input type="text" name="preferred_username" placeholder="Preferred Username" required>
                <div class="requirements">This will be your login username after approval</div>
            </div>
            <div class="form-group">
                <select name="role">
                    <option value="staff">Staff</option>
                    <option value="silo_manager">Silo Manager</option>
                    <option value="silo_attendant">Silo Attendant</option>
                    <option value="board_director">Board Director</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <button type="submit">Register →</button>
        </form>
        
        <div class="links">
            <a href="/login">← Already have an account? Sign In</a>
        </div>
    </div>
</body>
</html>
