<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="8d9f89a8b245fc66" />
    <title>Smart Silo System - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
 background-image: url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=1600');            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 1;
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 32px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 35px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrapper input {
            flex: 1;
            padding-right: 48px;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 50%;
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: color 0.2s, background 0.2s;
            flex-shrink: 0;
        }

        .password-toggle:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        .password-toggle svg {
            width: 20px;
            height: 20px;
            pointer-events: none;
        }
        
        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            font-size: 16px;
            color: white;
            transition: all 0.3s ease;
            outline: none;
        }
        
        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        input:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: rgba(46, 213, 115, 0.8);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        button:hover {
            background: rgba(46, 213, 115, 1);
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(46, 213, 115, 0.3);
        }
        
        .error {
            background: rgba(231, 76, 60, 0.9);
            color: white;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
        }
        
        .forgot-link {
            display: block;
            text-align: right;
            margin-top: 8px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
        }
        
        .forgot-link:hover {
            color: white;
        }
        
        .signup-section {
            margin-top: 25px;
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .signup-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-bottom: 12px;
        }
        
        .signup-btn {
            display: inline-block;
            padding: 10px 24px;
            background: rgba(37, 99, 235, 0.8);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .signup-btn:hover {
            background: rgba(37, 99, 235, 1);
            transform: scale(1.02);
        }
        
        .icon {
            text-align: center;
            font-size: 60px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 25px;
                width: 95%;
            }
            
            h1 {
                font-size: 24px;
            }
            
            input, button {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="icon">🌾</div>
        <h1>Welcome Back</h1>
        <div class="subtitle">Sign in to your account</div>
        
        {% if error %}
        <div class="error" id="errorMessage">{{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <div class="form-group">
                <input type="email" name="email" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Password" required>
                    <button type="button" class="password-toggle" onclick="togglePwd('password', this)" aria-label="Show or hide password">
                        <svg id="eye-password" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
                <a href="/forgot-password" class="forgot-link">Forgot Password?</a>
            </div>
            <button type="submit">Sign In →</button>
        </form>
        
        <div class="signup-section">
            <div class="signup-text">Don't have an account?</div>
            <a href="/register" class="signup-btn">Sign Up →</a>
        </div>
    </div>
    <script>
        function togglePwd(fieldId, btn) {
            var input = document.getElementById(fieldId);
            if (!input) return;
            var isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            /* swap between eye-open and eye-off SVG */
            btn.querySelector('svg').innerHTML = isHidden
                ? /* eye-off */
                  '<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.956 9.956 0 012.223-3.592M6.53 6.533A9.956 9.956 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.978 9.978 0 01-4.293 5.214M15 12a3 3 0 11-4.243-2.757M3 3l18 18"/>'
                : /* eye-open */
                  '<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
        }
    </script>
    {% if lock_until %}
    <script>
        (function() {
            var errorEl = document.getElementById('errorMessage');
            var lockUntil = new Date('{{ lock_until }}');
            if (!errorEl || isNaN(lockUntil.getTime())) return;

            function updateTimer() {
                var now = new Date();
                var diff = Math.max(0, Math.floor((lockUntil - now) / 1000));
                var minutes = Math.floor(diff / 60);
                var seconds = diff % 60;
                errorEl.textContent = 'Too many failed attempts. Try again after ' +
                    minutes + 'm ' + (seconds < 10 ? '0' + seconds : seconds) + 's.';
                if (diff <= 0) {
                    clearInterval(timer);
                    errorEl.textContent = 'You may try logging in again.';
                }
            }

            var timer = setInterval(updateTimer, 1000);
            updateTimer();
        })();
    </script>
    {% endif %}
</body>
</html>
