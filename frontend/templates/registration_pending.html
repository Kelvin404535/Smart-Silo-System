<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Submitted - Smart Silo System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-image: url('https://images.unsplash.com/photo-1574323347407-f5e1ad6d020b?w=1600');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255,255,255,0.2);
        }
        h2 { color: white; margin-bottom: 15px; }
        p { color: rgba(255,255,255,0.8); margin-bottom: 20px; line-height: 1.6; }
        .btn { 
            background: #10b981; 
            color: white; 
            padding: 12px 24px; 
            text-decoration: none; 
            border-radius: 8px; 
            display: inline-block;
            margin-top: 10px;
        }
        .btn:hover { background: #059669; transform: scale(1.02); }
        .icon { font-size: 60px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⏳</div>
        <h2>Registration Submitted!</h2>
        <p>Thank you, <strong>{{ name }}</strong>!</p>
        <p>Your registration request has been sent to the administrator for approval.</p>
        <p>You will receive an email once your account is approved with your login credentials.</p>
        <a href="/login" class="btn">Return to Login →</a>
    </div>
</body>
</html>
