<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Smart Silo System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-image: url('https://images.unsplash.com/photo-1574323347407-f5e1ad6d020b?w=1600');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: 0;
        }

        .navbar {
            position: relative;
            z-index: 10;
            background: rgba(44, 62, 80, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .nav-brand { font-size: 18px; font-weight: bold; }

        .back-link {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
            white-space: nowrap;
        }

        .back-link:hover { color: white; }

        .page-wrapper {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 30px 16px 40px;
        }

        .container {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 32px 28px;
            width: 100%;
            max-width: 480px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        h2 {
            color: white;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
        }

        .error {
            background: rgba(239, 68, 68, 0.9);
            color: white;
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 18px;
            font-size: 14px;
        }

        /* ── form group ─────────────────────────────────────────── */
        .form-group { margin-bottom: 18px; }

        label {
            display: block;
            color: rgba(255,255,255,0.85);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        /* ── password wrapper: input + eye button side-by-side ──── */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        /* input takes all available width, leaves room for button */
        .password-wrapper input {
            flex: 1;
            padding: 12px 48px 12px 14px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 10px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
            width: 100%;
        }

        .password-wrapper input:focus {
            background: rgba(255, 255, 255, 0.22);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .password-wrapper input::placeholder { color: rgba(255,255,255,0.4); }

        /* eye button absolutely positioned inside the wrapper */
        .eye-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            background: transparent;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: color 0.2s, background 0.2s;
            flex-shrink: 0;
        }

        .eye-btn:hover {
            background: rgba(255,255,255,0.15);
            color: white;
        }

        .eye-btn svg {
            width: 18px;
            height: 18px;
            pointer-events: none;
        }

        /* ── requirements box ───────────────────────────────────── */
        .requirements {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 18px;
            font-size: 12px;
            color: rgba(255,255,255,0.75);
            line-height: 1.9;
        }

        .requirements strong { color: white; }
        .requirements ul { padding-left: 18px; }
        .requirements li.valid   { color: #2ed573; }
        .requirements li.invalid { color: #ef4444; }

        /* ── submit button ──────────────────────────────────────── */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: rgba(37, 99, 235, 0.85);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit:hover {
            background: rgba(37, 99, 235, 1);
            transform: scale(1.02);
        }

        @media (max-width: 480px) {
            .container { padding: 24px 18px; }
            h2 { font-size: 19px; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="nav-brand">🔐 Change Password</div>
        <a href="/dashboard" class="back-link">← Back to Dashboard</a>
    </div>

    <div class="page-wrapper">
        <div class="container">
            <h2>🔐 Change Your Password</h2>

            {% if error %}
            <div class="error">⚠️ {{ error }}</div>
            {% endif %}

            <form method="POST">
                <!-- Current password -->
                <div class="form-group">
                    <label for="current_password">Current Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="current_password"
                               name="current_password"
                               placeholder="Enter current password" required>
                        <button type="button" class="eye-btn"
                                onclick="togglePwd('current_password', this)"
                                aria-label="Show or hide current password">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                 stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943
                                         9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943
                                         -9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- New password -->
                <div class="form-group">
                    <label for="new_password">New Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="new_password"
                               name="new_password"
                               placeholder="Enter new password"
                               required onkeyup="checkPassword()">
                        <button type="button" class="eye-btn"
                                onclick="togglePwd('new_password', this)"
                                aria-label="Show or hide new password">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                 stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943
                                         9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943
                                         -9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Confirm password -->
                <div class="form-group">
                    <label for="confirm_password">Confirm New Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirm_password"
                               name="confirm_password"
                               placeholder="Repeat new password" required>
                        <button type="button" class="eye-btn"
                                onclick="togglePwd('confirm_password', this)"
                                aria-label="Show or hide confirm password">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                 stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943
                                         9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943
                                         -9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="requirements">
                    <strong>Password must have:</strong>
                    <ul>
                        <li id="req1">At least 8 characters</li>
                        <li id="req2">1 uppercase letter (A–Z)</li>
                        <li id="req3">1 lowercase letter (a–z)</li>
                        <li id="req4">1 number (0–9)</li>
                        <li id="req5">1 special character (!@#$%^&amp;*)</li>
                    </ul>
                </div>

                <button type="submit" class="btn-submit">Update Password</button>
            </form>
        </div>
    </div>

    <script>
        /* SVG paths */
        var EYE_OPEN = '<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
        var EYE_OFF  = '<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.956 9.956 0 012.223-3.592M6.53 6.533A9.956 9.956 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.978 9.978 0 01-4.293 5.214M15 12a3 3 0 11-4.243-2.757M3 3l18 18"/>';

        function togglePwd(fieldId, btn) {
            var input = document.getElementById(fieldId);
            if (!input) return;
            var show = input.type === 'password';
            input.type = show ? 'text' : 'password';
            btn.querySelector('svg').innerHTML = show ? EYE_OFF : EYE_OPEN;
            btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
        }

        function checkPassword() {
            var pw = document.getElementById('new_password').value;
            function set(id, ok) {
                document.getElementById(id).className = ok ? 'valid' : 'invalid';
            }
            set('req1', pw.length >= 8);
            set('req2', /[A-Z]/.test(pw));
            set('req3', /[a-z]/.test(pw));
            set('req4', /[0-9]/.test(pw));
            set('req5', /[!@#$%^&*(),.?":{}|<>]/.test(pw));
        }
    </script>
</body>
</html>
