services:
  - type: web
    name: smart-silo-system
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn "run:app" --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --graceful-timeout 120 --keep-alive 5
    healthCheckPath: /health
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: RENDER
        value: true
      - key: DB_PATH
        value: /data/silo_management.db
      - key: SECRET_KEY
        generateValue: true
      - key: MAIL_USERNAME
        sync: false          # your Gmail address
      - key: MAIL_PASSWORD
        sync: false          # 16-char Gmail App Password
      - key: MAIL_DEFAULT_SENDER
        sync: false          # same as MAIL_USERNAME
      - key: MAIL_SERVER
        sync: false          # SMTP server host
      - key: MAIL_PORT
        sync: false          # SMTP server port
      - key: MAIL_USE_TLS
        sync: false          # enable TLS for SMTP
      - key: MAIL_USE_SSL
        sync: false          # enable SSL for SMTP
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_USERNAME
        sync: false
